<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speiderlageret - Lagersystem</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="container">
            <div class="topbar-left">
                <span class="topbar-icon">⚜️</span>
                <div>
                    <div class="topbar-title">Speiderlageret</div>
                    <div class="topbar-subtitle">LAGERSYSTEM</div>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab active" data-tab="lager">📦 Lager</button>
                <button class="tab" data-tab="legg-til">➕ Legg til</button>
                <button class="tab" data-tab="sammendrag">📊 Sammendrag</button>
            </nav>
            <div class="topbar-stats">
                <span><span class="stat-number" id="stat-total">0</span> gjenstander</span>
                <span><span class="stat-green" id="stat-tilgjengelig">0</span> tilgjengelig</span>
                <span><span class="stat-red" id="stat-utlånt">0</span> utlånt</span>
            </div>
        </div>
    </header>

    <main class="main-container">
        <section id="lager" class="tab-content active">
            <div class="filters-row">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Søk på navn, ID, serienummer...">
                </div>
                <select id="filterKategori" class="filter-select">
                    <option value="Alle">Alle kategorier</option>
                </select>
                <select id="filterStatus" class="filter-select">
                    <option value="Alle">Alle statuser</option>
                    <option value="Tilgjengelig">Tilgjengelig</option>
                    <option value="Utlånt">Utlånt</option>
                    <option value="Til reparasjon">Til reparasjon</option>
                    <option value="Tapt">Tapt</option>
                </select>
                <div class="filter-count">
                    <span id="count-shown">0</span> / <span id="count-total">0</span> vist
                </div>
            </div>

            <div class="table-wrapper">
                <table id="itemsTable" class="items-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="id">ID</th>
                            <th class="sortable" data-sort="navn">Navn</th>
                            <th class="sortable" data-sort="kategori">Kategori</th>
                            <th class="sortable" data-sort="serienummer">Serienr.</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable" data-sort="utlåntTil">Utlånt til</th>
                            <th>Handling</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody"></tbody>
                </table>
            </div>
        </section>

        <section id="legg-til" class="tab-content">
            <div class="form-container">
                <h2>➕ Legg til gjenstander</h2>
                <form id="addItemForm" class="add-form">
                    <div class="form-group">
                        <label>Navn på gjenstand *</label>
                        <input type="text" id="itemName" placeholder="f.eks. Kniv, Kompass..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Kategori</label>
                            <select id="itemKategori"></select>
                        </div>
                        <div class="form-group">
                            <label>Enhet</label>
                            <input type="text" id="itemEnhet" placeholder="stk" value="stk">
                        </div>
                    </div>
                    <div class="form-group serial-group">
                        <div class="serial-title">📋 Serienummer</div>
                        <div class="serial-row">
                            <div class="form-group">
                                <label>Antall</label>
                                <input type="number" id="itemAntall" min="1" value="1">
                            </div>
                            <div class="form-group">
                                <label>Prefiks</label>
                                <input type="text" id="itemPrefix" placeholder="Auto">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">➕ Legg til</button>
                </form>
            </div>
        </section>

        <section id="sammendrag" class="tab-content">
            <div class="kpi-grid" id="kpiGrid"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
